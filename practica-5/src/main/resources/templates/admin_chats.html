<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Chats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Blog ICC-352</a>
        <div class="d-flex align-items-center">
            <span class="text-light me-3" th:text="'Hola, ' + ${usuario.nombre}">Usuario</span>
            <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
        </div>
    </div>
</nav>

<div class="container" id="admin-chat-panel">
    <div class="row">
        <div class="col-lg-4 mb-3">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">Conversaciones</div>
                <div class="list-group list-group-flush" id="sesiones-lista"></div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <span id="chat-titulo">Selecciona una conversación</span>
                    <button id="cerrar-chat" class="btn btn-sm btn-outline-light" disabled>Cerrar chat</button>
                </div>
                <div class="card-body">
                    <div id="admin-mensajes" class="border rounded p-2 mb-3" style="height: 360px; overflow-y: auto;"></div>
                    <div class="input-group">
                        <input id="admin-texto" class="form-control" type="text" placeholder="Escribe una respuesta" disabled>
                        <button id="admin-enviar" class="btn btn-success" disabled>Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="/js/admin-chat.js"></script>
</body>
</html>
