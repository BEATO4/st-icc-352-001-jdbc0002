version: '3.8'

services:
  app:
    build: .
    ports:
      - "9090:9090"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=survey_app
    depends_on:
      - mongo
    networks:
      - survey-network

  mongo:
    image: mongo:6.0
    volumes:
      - mongo_data:/data/db
    networks:
      - survey-network

  proxy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - survey-network

volumes:
  mongo_data:
  caddy_data:
  caddy_config:

networks:
  survey-network:
    driver: bridge
