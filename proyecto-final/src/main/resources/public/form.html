<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FieldForm — Survey Form</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; flex-direction: column; }

    /* Slim secondary top bar */
    .form-top-bar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px; display: flex; align-items: center;
      gap: 14px; position: sticky; top: 0; z-index: 10;
    }
    .form-top-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; }

    /* Progress */
    .progress-wrap { margin-bottom: 28px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--ink-ghost); margin-bottom: 8px;
    }
    .progress-track { height: 4px; background: var(--parch-2); border-radius: 999px; overflow: hidden; }
    .progress-fill  {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--clay), #E8845A);
      transition: width 0.4s ease; width: 0%;
    }

    /* Draft saved indicator */
    .save-indicator {
      display: none; align-items: center; gap: 8px; padding: 10px 14px;
      background: var(--green-pale); border-radius: var(--radius-md);
      font-size: 13px; color: var(--green); margin-bottom: 16px;
    }
    .save-indicator.visible { display: flex; }
    .save-indicator svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

    /* Geo */
    .geo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .geo-btn {
      grid-column: 1 / -1; padding: 10px; font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 600; color: var(--ink-soft);
      background: var(--parch); border: 1.5px dashed var(--border);
      border-radius: var(--radius-md); cursor: pointer;
      transition: all var(--transition); display: flex; align-items: center;
      justify-content: center; gap: 7px;
    }
    .geo-btn:hover   { border-color: var(--clay); color: var(--clay); background: var(--clay-pale); }
    .geo-btn.located { color: var(--green); border-color: var(--green); background: var(--green-pale); border-style: solid; }
    .geo-btn svg { width: 15px; height: 15px; fill: currentColor; }

    /* Photo */
    .photo-actions {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .btn-camera {
      flex: 1; padding: 14px 10px; border-radius: var(--radius-md);
      border: 1.5px dashed var(--border); background: var(--parch);
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 8px; transition: all var(--transition);
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--ink-soft); position: relative;
    }
    .btn-camera input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .btn-camera:hover { border-color: var(--clay); color: var(--clay); background: var(--clay-pale); }
    .btn-camera svg { width: 22px; height: 22px; fill: currentColor; }
    .photo-preview {
      display: none; margin-top: 12px; border-radius: var(--radius-md);
      overflow: hidden; max-height: 220px; position: relative;
    }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-remove {
      position: absolute; top: 6px; right: 6px; width: 28px; height: 28px;
      background: rgba(0,0,0,0.55); border-radius: 50%; border: none;
      color: white; font-size: 15px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }

    /* Camera modal */
    .cam-modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
    }
    .cam-modal-overlay.open { display: flex; }
    .cam-modal {
      background: #111; border-radius: 16px; overflow: hidden;
      width: min(96vw, 480px); display: flex; flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }
    .cam-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; background: #1a1a1a;
    }
    .cam-title { color: #fff; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; }
    .cam-flip {
      background: rgba(255,255,255,0.12); border: none; color: #fff;
      border-radius: 8px; padding: 7px 12px; cursor: pointer;
      font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 600;
      display: flex; align-items: center; gap: 6px; transition: background 0.2s;
    }
    .cam-flip:hover { background: rgba(255,255,255,0.22); }
    .cam-flip svg { width: 16px; height: 16px; fill: currentColor; }
    #cam-video {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      background: #000; display: block;
    }
    .cam-footer {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; padding: 18px 20px; background: #1a1a1a;
    }
    .cam-capture {
      width: 64px; height: 64px; border-radius: 50%;
      background: #fff; border: 4px solid rgba(255,255,255,0.3);
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 0 6px rgba(255,255,255,0.15);
    }
    .cam-capture:active { transform: scale(0.92); }
    .cam-cancel {
      background: rgba(255,255,255,0.1); border: none; color: #ccc;
      padding: 10px 18px; border-radius: 10px; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
      transition: background 0.2s;
    }
    .cam-cancel:hover { background: rgba(255,255,255,0.18); color: #fff; }
    .cam-error {
      padding: 20px; text-align: center; color: #f87171;
      font-size: 13px; display: none;
    }

    /* Submit row */
    .submit-row { display: flex; gap: 12px; padding-top: 8px; }
    .btn-submit {
      flex: 2; padding: 13px; font-family: 'Syne', sans-serif; font-size: 15px;
      font-weight: 600; color: var(--white); background: var(--clay);
      border: none; border-radius: var(--radius-md); cursor: pointer;
      transition: all var(--transition); display: flex; align-items: center;
      justify-content: center; gap: 8px;
    }
    .btn-submit:hover { filter: brightness(1.07); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit svg { width: 16px; height: 16px; fill: currentColor; }

    @media (max-width: 480px) {
      .geo-grid    { grid-template-columns: 1fr; }
      .submit-row  { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- Form-specific slim top bar -->
<div class="form-top-bar">
  <button class="btn-back" onclick="window.history.back()">
    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div class="form-top-title" id="form-title">New Survey</div>
</div>

<div class="page-content narrow">
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Form completion</span><span id="prog-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-bar"></div></div>
  </div>

  <div class="save-indicator" id="save-indicator">
    <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
    Draft saved to your device
  </div>

  <!-- SECTION 1 — Personal Info -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon clay">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div>
        <div class="card-title">Personal Information</div>
        <div class="card-desc">Respondent details</div>
      </div>
    </div>

    <div class="field">
      <label>Full Name <span style="color:var(--clay)">*</span></label>
      <input type="text" id="f-name" placeholder="e.g. María García" oninput="updateProgress()" autocomplete="off">
    </div>
    <div class="field-grid">
      <div class="field">
        <label>Sector <span style="color:var(--clay)">*</span></label>
        <input type="text" id="f-sector" placeholder="e.g. Villa Mella" oninput="updateProgress()">
      </div>
      <div class="field">
        <label>Education Level <span style="color:var(--clay)">*</span></label>
        <select id="f-edu" onchange="updateProgress()">
          <option value="">Selecciona un nivel…</option>
          <option value="BASICO">Básico</option>
          <option value="MEDIO">Medio</option>
          <option value="GRADO_UNIVERSITARIO">Grado Universitario</option>
          <option value="POSTGRADO">Postgrado</option>
          <option value="DOCTORADO">Doctorado</option>
        </select>
      </div>
    </div>
  </div>

  <!-- SECTION 2 — Geolocation -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon ink">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <div>
        <div class="card-title">Geolocation</div>
        <div class="card-desc">GPS coordinates (optional)</div>
      </div>
    </div>
    <div class="geo-grid">
      <div class="field" style="margin-bottom:0">
        <label>Latitude</label>
        <input type="number" id="f-lat" placeholder="18.4861" step="any">
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Longitude</label>
        <input type="number" id="f-lng" placeholder="-69.9312" step="any">
      </div>
      <button class="geo-btn" id="geo-btn" onclick="getLocation()">
        <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06z"/></svg>
        Use my current location
      </button>
    </div>
  </div>

  <!-- SECTION 3 — Photo -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon green">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </div>
      <div>
        <div class="card-title">Photo Documentation</div>
        <div class="card-desc">Optional — stored on device</div>
      </div>
    </div>

    <div class="photo-actions">
      <!-- Live camera button -->
      <button class="btn-camera" id="btn-open-camera" onclick="openCamera()">
        <svg viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 0 1 8.8 12 3.2 3.2 0 0 1 12 8.8 3.2 3.2 0 0 1 15.2 12 3.2 3.2 0 0 1 12 15.2M12 7A5 5 0 0 0 7 12a5 5 0 0 0 5 5 5 5 0 0 0 5-5A5 5 0 0 0 12 7M20 4h-3.17L15 2H9L7.17 4H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>
        Take Photo
      </button>
      <!-- File upload fallback -->
      <button class="btn-camera" style="position:relative;">
        <input type="file" id="f-photo" accept="image/*" onchange="handlePhotoFile(event)" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;">
        <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
        Upload File
      </button>
    </div>

    <div class="photo-preview" id="photo-preview">
      <img id="photo-img" src="" alt="Preview">
      <button class="photo-remove" onclick="removePhoto()">✕</button>
    </div>
  </div>

  <!-- Camera modal -->
  <div class="cam-modal-overlay" id="cam-modal">
    <div class="cam-modal">
      <div class="cam-header">
        <span class="cam-title">📷 Take a Photo</span>
        <button class="cam-flip" id="cam-flip-btn" onclick="flipCamera()">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41zM20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h4.05l1.83-2h4.24l1.83 2H20v12z"/></svg>
          Flip
        </button>
      </div>
      <video id="cam-video" autoplay playsinline muted></video>
      <div class="cam-error" id="cam-error">Could not access camera. Please allow camera permission or use the Upload File option.</div>
      <div class="cam-footer">
        <button class="cam-cancel" onclick="closeCamera()">Cancel</button>
        <button class="cam-capture" id="cam-capture-btn" onclick="capturePhoto()" title="Capture"></button>
      </div>
    </div>
  </div>
  <canvas id="cam-canvas" style="display:none;"></canvas>

  <!-- Submit -->
  <div class="submit-row">
    <button class="btn-secondary" onclick="saveDraft()">Save Draft</button>
      <button class="btn-submit" id="submit-btn" onclick="submitForm()">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        <span id="submit-label">Submit Survey</span>
    </button>
  </div>
</div>

<div id="toast"></div>

<script src="/js/storage.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
  const user = requireAuth();
  let photoData = null;
  let isSubmitting = false;
  let editingId = null;
  let editingRecord = null;

  function updateProgress() {
    const fields = [
      document.getElementById('f-name').value.trim(),
      document.getElementById('f-sector').value.trim(),
      document.getElementById('f-edu').value,
    ];
    const pct = Math.round((fields.filter(Boolean).length / fields.length) * 100);
    document.getElementById('prog-bar').style.width = pct + '%';
    document.getElementById('prog-pct').textContent = pct + '%';
  }

  function setSubmitState(disabled) {
    const submitBtn = document.getElementById('submit-btn');
    if (!submitBtn) return;
    submitBtn.disabled = disabled;
    submitBtn.style.opacity = disabled ? '0.7' : '1';
    submitBtn.style.cursor = disabled ? 'wait' : 'pointer';
  }

  function goToDashboard() {
    sessionStorage.setItem('fieldform_refresh_dashboard', '1');
    window.location.href = '/dashboard.html';
  }

  function getLocation() {
    if (!navigator.geolocation) { toast('Geolocation not supported'); return; }
    const btn = document.getElementById('geo-btn');
    btn.textContent = 'Getting location…';
    navigator.geolocation.getCurrentPosition(
            pos => {
              document.getElementById('f-lat').value = pos.coords.latitude.toFixed(6);
              document.getElementById('f-lng').value = pos.coords.longitude.toFixed(6);
              btn.className = 'geo-btn located';
              btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>Location captured';
              toast('Location set');
            },
            () => {
              btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06z"/></svg>Use my current location';
              toast('Could not get location');
            }
    );
  }

  /* ── File upload fallback ──────────────────────────── */
  function handlePhotoFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload  = e => setPhotoPreview(e.target.result);
    reader.onerror = () => toast('Could not read the file');
    reader.readAsDataURL(file);
  }

  function removePhoto() {
    photoData = null;
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('f-photo').value = '';
  }

  function setPhotoPreview(dataUrl) {
    photoData = dataUrl;
    document.getElementById('photo-img').src = dataUrl;
    document.getElementById('photo-preview').style.display = 'block';
  }

  /* ── Live camera (MediaDevices API) ────────────────── */
  let camStream  = null;
  let camFacing  = 'environment'; // 'environment' = rear, 'user' = front

  async function openCamera() {
    const modal  = document.getElementById('cam-modal');
    const video  = document.getElementById('cam-video');
    const errEl  = document.getElementById('cam-error');
    const capBtn = document.getElementById('cam-capture-btn');

    modal.classList.add('open');
    errEl.style.display  = 'none';
    video.style.display  = 'block';
    capBtn.style.display = 'block';
    document.getElementById('cam-flip-btn').style.display = 'flex';

    await startStream();
  }

  async function startStream() {
    // Stop any existing stream first
    if (camStream) camStream.getTracks().forEach(t => t.stop());

    const video  = document.getElementById('cam-video');
    const errEl  = document.getElementById('cam-error');
    const capBtn = document.getElementById('cam-capture-btn');

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      errEl.style.display  = 'block';
      video.style.display  = 'none';
      capBtn.style.display = 'none';
      document.getElementById('cam-flip-btn').style.display = 'none';
      return;
    }

    try {
      camStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: camFacing, width: { ideal: 1280 }, height: { ideal: 960 } },
        audio: false
      });
      video.srcObject = camStream;
      errEl.style.display = 'none';
    } catch (err) {
      console.warn('[Camera]', err);
      errEl.style.display  = 'block';
      video.style.display  = 'none';
      capBtn.style.display = 'none';
      document.getElementById('cam-flip-btn').style.display = 'none';
    }
  }

  async function flipCamera() {
    camFacing = camFacing === 'environment' ? 'user' : 'environment';
    await startStream();
  }

  function capturePhoto() {
    const video  = document.getElementById('cam-video');
    const canvas = document.getElementById('cam-canvas');
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.88);
    setPhotoPreview(dataUrl);
    closeCamera();
    toast('Photo captured!');
  }

  function closeCamera() {
    if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
    document.getElementById('cam-modal').classList.remove('open');
    document.getElementById('cam-video').srcObject = null;
  }

  // Close modal with Escape key
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCamera(); });

  function buildPayload() {
    return {
      id: 'local-' + Date.now(),
      name: document.getElementById('f-name').value.trim(),
      sector: document.getElementById('f-sector').value.trim(),
      educationalLevel: document.getElementById('f-edu').value,
      latitude: parseFloat(document.getElementById('f-lat').value) || null,
      longitude: parseFloat(document.getElementById('f-lng').value) || null,
      photoBase64: photoData,
      userId: user.username,
      username: user.username,
      createdAt: new Date().toISOString(),
    };
  }

  function buildApiPayload() {
    return {
      name: document.getElementById('f-name').value.trim(),
      sector: document.getElementById('f-sector').value.trim(),
      educationalLevel: document.getElementById('f-edu').value,
      latitude: parseFloat(document.getElementById('f-lat').value) || null,
      longitude: parseFloat(document.getElementById('f-lng').value) || null,
      photoBase64: photoData || null,
    };
  }

  function applyFormData(form) {
    document.getElementById('f-name').value = form.name || '';
    document.getElementById('f-sector').value = form.sector || '';
    document.getElementById('f-edu').value = form.educationalLevel || '';
    document.getElementById('f-lat').value = form.latitude ?? '';
    document.getElementById('f-lng').value = form.longitude ?? '';

    if (form.photoBase64) {
      photoData = form.photoBase64;
      document.getElementById('photo-img').src = form.photoBase64;
      document.getElementById('photo-preview').style.display = 'block';
      document.getElementById('photo-upload-area').style.display = 'none';
    }
    updateProgress();
  }

  async function loadEditDataIfNeeded() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) return;

    editingId = id;
    editingRecord = await SurveyStorage.findSurvey(id);
    document.getElementById('form-title').textContent = 'Edit Survey';
    document.getElementById('submit-label').textContent = 'Update Survey';

    if (editingRecord && editingRecord.status !== 'synced') {
      applyFormData(editingRecord);
      return;
    }

    if (!navigator.onLine) {
      toast('No internet connection: cannot load survey for editing');
      return;
    }

    const res = await API.surveys.getById(id);
    if (!res.ok) {
      if (res.status === 401) {
        SurveyStorage.clearUser();
        window.location.href = '/login.html';
        return;
      }
      toast('Could not load survey: ' + res.message);
      return;
    }

    applyFormData(res.data.form || {});
  }

  /* ── SAVE DRAFT ────────────────────────── */
  async function saveDraft() {
    if (!document.getElementById('f-name').value.trim()) { toast('Enter at least a name to save a draft'); return; }

    const payload = buildPayload();
    if (editingRecord && editingRecord.status !== 'synced') {
      await SurveyStorage.updateSurvey(editingId, {
        ...payload,
        id: editingId,
        status: 'local',
        createdAt: editingRecord.createdAt || payload.createdAt,
        updatedAt: new Date().toISOString()
      });
    } else {
      await SurveyStorage.addSurvey({ ...payload, status: 'local' });
    }

    document.getElementById('save-indicator').classList.add('visible');
    toast('Draft saved to device');
    goToDashboard();
  }

  async function submitForm() {
    if (isSubmitting) return;

    const name = document.getElementById('f-name').value.trim();
    const sector = document.getElementById('f-sector').value.trim();
    const edu = document.getElementById('f-edu').value;
    if (!name || !sector || !edu) { toast('Por favor llena todos los campos requeridos'); return; }

    isSubmitting = true;
    setSubmitState(true);

    try {
      const payload = buildPayload();
      const apiPayload = buildApiPayload();

      if (editingId) {
        if (editingRecord && editingRecord.status !== 'synced') {
          if (navigator.onLine) {
            const createRes = await API.surveys.create(apiPayload);
            if (!createRes.ok) {
              if (createRes.status === 401) {
                SurveyStorage.clearUser();
                window.location.href = '/login.html';
                return;
              }

              await SurveyStorage.updateSurvey(editingId, {
                ...payload,
                id: editingId,
                status: 'pending',
                createdAt: editingRecord.createdAt || payload.createdAt,
                updatedAt: new Date().toISOString()
              });
              toast(`Error publishing survey (${createRes.message}) — queued for sync`);
              if (window.syncWorker) window.syncWorker.postMessage({ type: 'SYNC_NOW' });
              goToDashboard();
              return;
            }

            await SurveyStorage.updateSurvey(editingId, {
              ...payload,
              id: editingId,
              status: 'synced',
              serverId: createRes.data?.form?.id,
              createdAt: editingRecord.createdAt || payload.createdAt,
              updatedAt: new Date().toISOString()
            });
            toast('Survey published');
            goToDashboard();
            return;
          }

          await SurveyStorage.updateSurvey(editingId, {
            ...payload,
            id: editingId,
            status: 'pending',
            createdAt: editingRecord.createdAt || payload.createdAt,
            updatedAt: new Date().toISOString()
          });
          toast('No connection: survey queued for sync');
          if (window.syncWorker) window.syncWorker.postMessage({ type: 'SYNC_NOW' });
          goToDashboard();
          return;
        }

        if (!navigator.onLine) {
          toast('No internet connection: cannot update right now');
          return;
        }

        const updateRes = await API.surveys.update(editingId, apiPayload);
        if (!updateRes.ok) {
          if (updateRes.status === 401) {
            SurveyStorage.clearUser();
            window.location.href = '/login.html';
            return;
          }
          toast(`Error updating survey (${updateRes.message})`);
          return;
        }

        await SurveyStorage.upsertSurvey({
          ...payload,
          id: editingId,
          serverId: editingId,
          status: 'synced'
        });
        toast('Survey updated');
        goToDashboard();
        return;
      }

      if (navigator.onLine) {
        const res = await API.surveys.create(apiPayload);

        if (res.ok) {
          const serverId = res.data?.form?.id;
          // Store with serverId as the primary key so refreshFromServer()
          // upserts the same key instead of creating a second record.
          await SurveyStorage.upsertSurvey({
            ...payload,
            id:       serverId || payload.id,
            serverId: serverId,
            status:   'synced'
          });
          toast('Encuesta enviada');
          goToDashboard();
          return;
        }

        if (res.status === 401) {
          SurveyStorage.clearUser();
          window.location.href = '/login.html';
          return;
        }

        toast(`Error al enviar (${res.message}) — guardado localmente`);
        await SurveyStorage.addSurvey({ ...payload, status: 'pending' });
        if (window.syncWorker) window.syncWorker.postMessage({ type: 'SYNC_NOW' });
        goToDashboard();
        return;
      }

      await SurveyStorage.addSurvey({ ...payload, status: 'pending' });
      toast('Sin conexion — guardado localmente, se sincronizara al reconectarse');
      if (window.syncWorker) window.syncWorker.postMessage({ type: 'SYNC_NOW' });
      goToDashboard();
    } catch (err) {
      console.error('[submitForm] Error inesperado', err);
      try {
        const payload = buildPayload();
        await SurveyStorage.addSurvey({ ...payload, status: 'pending' });
        if (window.syncWorker) window.syncWorker.postMessage({ type: 'SYNC_NOW' });
      } catch (_) {}
      toast('Ocurrio un error, pero se guardo localmente');
      goToDashboard();
    } finally {
      setTimeout(() => {
        isSubmitting = false;
        setSubmitState(false);
      }, 500);
    }
  }

  loadEditDataIfNeeded();
  updateProgress();
</script>
</body>
</html>
